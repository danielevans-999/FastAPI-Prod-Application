version: "3.9"

services:

  # ── FastAPI Application ──────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  # ── Celery Worker ────────────────────────────────────
  celery_worker:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_tasks.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ── Celery Beat (cron scheduler) ─────────────────────
  celery_beat:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_tasks.celery_app beat --loglevel=info
    restart: unless-stopped

  # ── Flower (Celery monitoring UI) ────────────────────
  flower:
    build: .
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.tasks.celery_tasks.celery_app flower --port=5555
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     fastapi_user
      POSTGRES_PASSWORD: fastapi_password
      POSTGRES_DB:       fastapi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── NGINX (SSL termination + reverse proxy) ──────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
